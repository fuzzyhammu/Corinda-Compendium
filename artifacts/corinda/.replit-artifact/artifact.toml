kind = "web"
previewPath = "/"
title = "Corinda — Thirteen Steps Dashboard"
version = "1.0.0"
id = "artifacts/corinda"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21362

[services.development]
run = "pnpm --filter @workspace/corinda run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/corinda", "run", "build" ]
publicDir = "artifacts/corinda/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21362"
BASE_PATH = "/"
